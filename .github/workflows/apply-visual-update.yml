name: Apply Visual Update

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-visual-update.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-visual-update
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download visual update
        run: |
          curl -fsSL "https://tmpfiles.org/dl/wHw37AB0WYm7/bitxchange-visual-update.zip" -o /tmp/bitxchange-visual-update.zip
          echo "e974b083bc5f10db7d6c178ab4559413dce5b9a77845e50df0ba61aff4f1d03a  /tmp/bitxchange-visual-update.zip" | sha256sum -c -

      - name: Apply files
        run: |
          unzip -o /tmp/bitxchange-visual-update.zip -d .
          git status --short

      - name: Commit visual update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/globals.css app/layout.tsx app/page.tsx components/Audience.tsx components/Benefits.tsx components/FAQ.tsx components/FinalCTA.tsx components/Hero.tsx components/Pricing.tsx components/Process.tsx components/Testimonials.tsx components/ThemeProvider.tsx lib/content.ts
          if git diff --cached --quiet; then
            echo "No visual changes to commit."
          else
            git commit -m "Apply dark visual refresh and testimonials"
            git push
          fi
