name: Bootstrap BitXchange source

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-source.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bootstrap-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download source bundle
        run: |
          curl -fsSL "https://tmpfiles.org/dl/wXwNnCIdykJ7/bitxchange-source-noworkflow.zip" -o /tmp/bitxchange-source.zip
          echo "388c702d44d0c145ce00a91855c4f75d9fd9e75e682a02a9202c6eba9ac9a751  /tmp/bitxchange-source.zip" | sha256sum -c -

      - name: Unpack project source
        run: |
          mkdir -p /tmp/bitxchange-bootstrap
          cp .github/workflows/bootstrap-source.yml /tmp/bitxchange-bootstrap/bootstrap-source.yml
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          unzip -q /tmp/bitxchange-source.zip -d .
          mkdir -p .github/workflows
          cp /tmp/bitxchange-bootstrap/bootstrap-source.yml .github/workflows/bootstrap-source.yml

      - name: Commit project source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Initialize BitXchange landing project"
            git push
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static GitHub Pages export
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
